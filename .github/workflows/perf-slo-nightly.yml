name: Perf SLO Nightly

on:
  schedule:
    - cron: "15 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  perf-slo-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run bench_v2 (read/write profile)
        run: |
          set -euo pipefail
          mkdir -p artifacts/perf
          DATE_UTC="$(date -u +%F)"
          CONCURRENCY_JSON="artifacts/perf/concurrency-slo-${DATE_UTC}.json"
          BENCH_LOG="artifacts/perf/concurrency-slo-${DATE_UTC}.log"
          set +e
          cargo run --example bench_v2 -p nervusdb-storage --release -- \
            --nodes 50000 \
            --degree 8 \
            --iters 2000 \
            --write-iters 200 \
            2>&1 | tee "${BENCH_LOG}"
          RUN_RC=${PIPESTATUS[0]}
          set -e
          if [[ "${RUN_RC}" -ne 0 ]]; then
            printf '{"error":"bench_v2_failed","exit_code":%s}\n' "${RUN_RC}" > "${CONCURRENCY_JSON}"
            exit "${RUN_RC}"
          fi
          LINE="$(grep -E '^\{.*\}$' "${BENCH_LOG}" | tail -n 1 || true)"
          test -n "${LINE}"
          printf '%s\n' "${LINE}" > "${CONCURRENCY_JSON}"
          jq -e . "${CONCURRENCY_JSON}" >/dev/null
          echo "[perf-slo-nightly] wrote ${CONCURRENCY_JSON}"

      - name: Run hnsw_tune (single run for gate)
        run: |
          set -euo pipefail
          mkdir -p artifacts/perf
          DATE_UTC="$(date -u +%F)"
          HNSW_JSON="artifacts/perf/hnsw-slo-${DATE_UTC}.json"
          HNSW_LOG="artifacts/perf/hnsw-slo-${DATE_UTC}.log"
          set +e
          cargo run --example hnsw_tune -p nervusdb-storage --release -- \
            --nodes 10000 \
            --dim 64 \
            --queries 100 \
            --k 10 \
            --m 16 \
            --ef-construction 200 \
            --ef-search 128 \
            2>&1 | tee "${HNSW_LOG}"
          RUN_RC=${PIPESTATUS[0]}
          set -e
          if [[ "${RUN_RC}" -ne 0 ]]; then
            printf '{"error":"hnsw_tune_failed","exit_code":%s}\n' "${RUN_RC}" > "${HNSW_JSON}"
            exit "${RUN_RC}"
          fi
          LINE="$(grep -E '^\{.*\}$' "${HNSW_LOG}" | tail -n 1 || true)"
          test -n "${LINE}"
          printf '%s\n' "${LINE}" > "${HNSW_JSON}"
          jq -e . "${HNSW_JSON}" >/dev/null
          echo "[perf-slo-nightly] wrote ${HNSW_JSON}"

      - name: Run perf SLO gate
        run: |
          set -euo pipefail
          DATE_UTC="$(date -u +%F)"
          CONCURRENCY_JSON="artifacts/perf/concurrency-slo-${DATE_UTC}.json"
          HNSW_JSON="artifacts/perf/hnsw-slo-${DATE_UTC}.json"
          bash scripts/perf_slo_gate.sh \
            --concurrency-json "${CONCURRENCY_JSON}" \
            --hnsw-json "${HNSW_JSON}" \
            --out-dir artifacts/perf \
            --as-of-date "${DATE_UTC}"

      - name: Summarize perf SLO outcome
        if: always()
        run: |
          set -euo pipefail
          DATE_UTC="$(date -u +%F)"
          CONCURRENCY_JSON="artifacts/perf/concurrency-slo-${DATE_UTC}.json"
          HNSW_JSON="artifacts/perf/hnsw-slo-${DATE_UTC}.json"
          GATE_JSON="artifacts/perf/perf-slo-gate-${DATE_UTC}.json"
          HNSW_LOG="artifacts/perf/hnsw-slo-${DATE_UTC}.log"

          {
            echo "## Perf SLO Nightly Summary (${DATE_UTC} UTC)"
            if [[ -f "${GATE_JSON}" ]] && jq -e . "${GATE_JSON}" >/dev/null 2>&1; then
              echo "- Overall: $(jq -r '.overall_status // \"unknown\"' "${GATE_JSON}")"
              echo "- Read p99: $(jq -r '.checks.read_query_p99_ms.actual_ms // \"n/a\"' "${GATE_JSON}") ms / threshold $(jq -r '.checks.read_query_p99_ms.threshold_ms // \"n/a\"' "${GATE_JSON}")"
              echo "- Write p99: $(jq -r '.checks.write_txn_p99_ms.actual_ms // \"n/a\"' "${GATE_JSON}") ms / threshold $(jq -r '.checks.write_txn_p99_ms.threshold_ms // \"n/a\"' "${GATE_JSON}")"
              echo "- Vector p99: $(jq -r '.checks.vector_search_p99_ms.actual_ms // \"n/a\"' "${GATE_JSON}") ms / threshold $(jq -r '.checks.vector_search_p99_ms.threshold_ms // \"n/a\"' "${GATE_JSON}")"
              echo "- Recall@k: $(jq -r '.checks.vector_recall_at_k.actual // \"n/a\"' "${GATE_JSON}") / threshold $(jq -r '.checks.vector_recall_at_k.threshold_min // \"n/a\"' "${GATE_JSON}")"
            else
              echo "- Overall: failed before gate report generation"
              echo "- concurrency JSON: $(if [[ -f "${CONCURRENCY_JSON}" ]]; then echo present; else echo missing; fi)"
              echo "- hnsw JSON: $(if [[ -f "${HNSW_JSON}" ]]; then echo present; else echo missing; fi)"
              if [[ -f "${HNSW_JSON}" ]] && jq -e . "${HNSW_JSON}" >/dev/null 2>&1; then
                echo "- hnsw JSON payload: $(jq -c . "${HNSW_JSON}")"
              fi
              if [[ -f "${HNSW_LOG}" ]]; then
                echo ""
                echo "### hnsw_tune log tail"
                tail -n 25 "${HNSW_LOG}"
              fi
            fi
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload perf SLO artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-slo-artifacts
          path: artifacts/perf/
